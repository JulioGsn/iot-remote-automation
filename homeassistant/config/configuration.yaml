
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ===== MQTT Integration =====
mqtt:
  sensor:
    - name: "Temperatura Fogao"
      unique_id: home_office_temperatura_fogao
      state_topic: "home/cozinha/fogao/temperatura"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement

    - name: "Home Server Temperatura"
      unique_id: home_office_home_server_temperatura
      state_topic: "home/server/telemetry/temperature"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement

    - name: "Home Server CPU"
      unique_id: home_office_home_server_cpu
      state_topic: "home/server/telemetry/cpu"
      unit_of_measurement: "%"
      state_class: measurement
      icon: "mdi:cpu-64-bit"

    - name: "Home Server RAM"
      unique_id: home_office_home_server_ram
      state_topic: "home/server/telemetry/memory"
      unit_of_measurement: "%"
      state_class: measurement
      icon: "mdi:memory"

    - name: "Home Server Processos"
      unique_id: home_office_home_server_processos
      state_topic: "home/server/telemetry/processes"
      state_class: measurement
      icon: "mdi:application-cog"

    - name: "Home Server Processos Principais"
      unique_id: home_office_home_server_processos_principais
      state_topic: "home/server/telemetry/top_processes"
      icon: "mdi:format-list-bulleted"

  binary_sensor:
    - name: "Alerta Temperatura"
      unique_id: home_office_alerta_temperatura
      state_topic: "home/cozinha/fogao/alerta"
      payload_on: "CRITICO"
      payload_off: "NORMAL"
      device_class: heat

    - name: "Home Server Online"
      unique_id: home_office_home_server_online
      state_topic: "home/server/status"
      payload_on: "ONLINE"
      payload_off: "OFFLINE"
      device_class: connectivity

    - name: "Interfone Tocando"
      unique_id: home_office_interfone_tocando
      state_topic: "home/interfone/status"
      payload_on: "TOCANDO"
      payload_off: "SILENCIO"
      device_class: sound

  lock:
    - name: "Fechadura Porta"
      unique_id: home_office_fechadura_porta
      command_topic: "home/seguranca/porta/cmd"
      state_topic: "home/seguranca/porta/state"
      payload_lock: "TRAVAR"
      payload_unlock: "DESTRANCAR"
      state_locked: "TRANCADO"
      state_unlocked: "DESTRANCADO"

  button:
    - name: "Pulso Power Home Server"
      unique_id: home_office_pulso_power_home_server
      command_topic: "home/server/power/cmd"
      payload_press: "LIGAR"
      icon: "mdi:power"

    - name: "Abrir Portao Interfone"
      unique_id: home_office_abrir_portao_interfone
      command_topic: "home/interfone/abrir"
      payload_press: "ABRIR"
      icon: "mdi:gate"

  select:
    - name: "Letreiro Reuniao"
      unique_id: home_office_letreiro_reuniao
      command_topic: "home/escritorio/status/cmd"
      state_topic: "home/escritorio/status"
      retain: false
      options:
        - "livre"
        - "foco"
        - "reuniao"

lovelace:
  resource_mode: yaml
  dashboards:
    lovelace:
      mode: yaml
      filename: ui-lovelace.yaml
      title: Remoto
      icon: mdi:remote
      show_in_sidebar: true
