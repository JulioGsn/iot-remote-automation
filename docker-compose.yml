services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - iot-net

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: iot-homeassistant
    restart: unless-stopped
    ports:
      - "${HA_PORT:-8124}:8123"
    volumes:
      - ./homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    networks:
      - iot-net
    depends_on:
      - mosquitto

  home-server-telemetry:
    image: eclipse-mosquitto:2
    container_name: iot-home-server-telemetry
    restart: unless-stopped
    command: ["/bin/sh", "/scripts/home-server-telemetry.sh"]
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      INTERVAL: 5
    volumes:
      - ./scripts/home-server-telemetry.sh:/scripts/home-server-telemetry.sh:ro
    networks:
      - iot-net
    depends_on:
      - mosquitto

networks:
  iot-net:
    driver: bridge

volumes:
  mosquitto-data:
  mosquitto-log:
